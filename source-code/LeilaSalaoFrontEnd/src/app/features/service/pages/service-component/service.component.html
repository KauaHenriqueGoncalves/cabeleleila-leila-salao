<div class="services-page">

    <div class="page-header">

        <div>
            <h1>Serviços</h1>
            <p>
                Gerencie os serviços disponíveis.
            </p>
        </div>

        <button class="create-button" (click)="openModal()">
            Novo Serviço
        </button>

    </div>

    <div class="table-container">

        <table>

            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Duração</th>
                    <th>Valor</th>
                    <th></th>
                </tr>
            </thead>

            <tbody>

                @for(service of services; track service.id) {

                <tr>

                    <td>
                        <div class="service-name">
                            {{ service.name }}
                        </div>

                        <div class="description">
                            {{ service.description }}
                        </div>
                    </td>

                    <td>
                        {{ service.durationMinutes }} min
                    </td>

                    <td>
                        {{ service.price | currency:'BRL' }}
                    </td>

                    <td class="actions">

                        <button class="delete-button" (click)="deleteService(service)">
                            Excluir
                        </button>

                    </td>

                </tr>

                }

            </tbody>

        </table>

    </div>

</div>

@if(showModal) {

<div class="modal-backdrop">

    <div class="modal">

        <h2>Novo Serviço</h2>

        <form [formGroup]="form" (ngSubmit)="createService()">

            <div class="field">
                <label>Nome</label>
                <input formControlName="name">
            </div>

            <div class="field">
                <label>Descrição</label>
                <textarea formControlName="description"></textarea>
            </div>

            <div class="grid">

                <div class="field">
                    <label>Duração (min)</label>
                    <input type="number" formControlName="durationMinutes">
                </div>

                <div class="field">
                    <label>Valor</label>
                    <input type="number" formControlName="price">
                </div>

            </div>

            <div class="modal-actions">

                <button type="button" class="secondary-button" (click)="closeModal()">
                    Cancelar
                </button>

                <button type="submit" class="create-button">
                    Salvar
                </button>

            </div>

        </form>

    </div>

</div>

}
