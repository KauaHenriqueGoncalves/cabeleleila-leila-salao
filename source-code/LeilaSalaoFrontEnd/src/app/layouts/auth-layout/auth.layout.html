<div class="layout">

  <aside class="sidebar">
    <div class="logo">
      Leila
    </div>

    <nav>
      @for(item of menu(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
        >
          {{ item.label }}
        </a>
      }
      <a (click)="logout()">Sair</a>
    </nav>
  </aside>

  <main class="content">
    <router-outlet />
  </main>

</div>
